name: Update Mega Sena Stats
on:
  schedule:
    # Quartas, Sextas e Domingos às 04:00 UTC (01:00 Horário de Brasília)
    - cron: '0 4 * * 0,3,5'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install axios

      - name: Run sync script
        run: node sync-mega.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mega-sena-stats.json
          git commit -m "chore: update mega-sena stats [skip ci]" || echo "No changes to commit"
          git push